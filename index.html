<!-- ── Hero Immersive ── -->
<section class="hero-immersive" aria-labelledby="heroLabel">

  <!-- Background -->
  <div class="hi-bg" aria-hidden="true">
    <div class="hi-bg-img" id="hiBgImg"></div>
    <div class="hi-bg-overlay"></div>
  </div>

  <!-- Eyebrow -->
  <div class="hi-eyebrow-mask" aria-hidden="true">
    <p class="hi-eyebrow">Street Luxury — Tokyo · Ginza</p>
  </div>

  <!-- Brand: CIELO — each letter in its own overflow:hidden mask -->
  <h1 class="hi-brand" id="heroLabel">
    <span class="hi-char-mask"><span class="hi-char" data-delay="0">C</span></span><!--
    --><span class="hi-char-mask"><span class="hi-char" data-delay="62">I</span></span><!--
    --><span class="hi-char-mask"><span class="hi-char" data-delay="124">E</span></span><!--
    --><span class="hi-char-mask"><span class="hi-char" data-delay="186">L</span></span><!--
    --><span class="hi-char-mask"><span class="hi-char" data-delay="248">O</span></span>
  </h1>

  <!-- Subtitle -->
  <div class="hi-sub-mask" aria-hidden="true">
    <p class="hi-sub">Jewelry. Apparel. Art.</p>
  </div>

  <!-- Scroll indicator -->
  <div class="hi-scroll" aria-label="下にスクロール">
    <span class="hi-scroll-line" aria-hidden="true"></span>
  </div>

</section>

<!-- ── Category Nav ── -->
<nav class="category-nav" aria-label="カテゴリ">
  <div class="category-nav-inner">
    <button class="cat-btn active" data-cat="all">All</button>
    <button class="cat-btn" data-cat="jewelry">Jewelry</button>
    <button class="cat-btn" data-cat="apparel">Apparel</button>
    <button class="cat-btn" data-cat="art">Art</button>
  </div>
</nav>

<!-- ── Search + Tag Dropdown ── -->
<div class="search-bar">
  <div class="search-row">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        class="search-input"
        id="searchInput"
        placeholder="商品を検索..."
        aria-label="商品検索"
      >
    </div>
    <div class="tag-dropdown-wrap" id="tagDropdownWrap">
      <button class="tag-dropdown-btn" id="tagDropdownBtn" aria-haspopup="true" aria-expanded="false">
        <span class="tag-dropdown-label" id="tagDropdownLabel">タグ検索</span>
        <svg class="tag-dropdown-caret" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="1 1 5 5 9 1"/>
        </svg>
      </button>
      <div class="tag-dropdown-menu" id="tagDropdownMenu" role="listbox"></div>
    </div>
  </div>
</div>

<!-- ── Product Grid ── -->
<section class="products-section" id="products">
  <p class="products-count" id="productsCount"></p>
  <div class="product-grid" id="productGrid">
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
  </div>
</section>
